{{- if .Values.kafka.enabled }}
---
# page.crawled — emitted by the crawler, consumed by the chunker.
# 3 partitions: allows up to 3 parallel chunker replicas at max KEDA scale (maxReplicaCount=4).
# Partition count cannot be reduced after creation; only increased.
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: page-crawled
  namespace: {{ .Release.Namespace }}
  labels:
    strimzi.io/cluster: kafka-cluster
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  topicName: {{ .Values.kafka.topics.pageCrawled }}
  partitions: {{ .Values.kafka.topicPartitions }}
  replicas: 1
  config:
    retention.ms: "86400000"        # 24h, matches broker default above
    cleanup.policy: delete
    # Compact would allow at-most-one message per URL key, but we want
    # the full crawl history for debugging; use delete policy instead.
---
# chunk.ready — emitted by the chunker, consumed by the embedding service.
# 6 partitions: embedding service scales up to 8 replicas (maxReplicaCount=8),
# but 6 partitions is a practical ceiling for a docs-scale corpus.
# More partitions than consumer replicas is fine; fewer would starve replicas.
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: chunk-ready
  namespace: {{ .Release.Namespace }}
  labels:
    strimzi.io/cluster: kafka-cluster
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  topicName: {{ .Values.kafka.topics.chunkReady }}
  partitions: {{ mul .Values.kafka.topicPartitions 2 }}
  replicas: 1
  config:
    retention.ms: "86400000"
    cleanup.policy: delete
{{- end }}
