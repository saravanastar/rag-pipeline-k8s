{{- if .Values.kafka.enabled }}
# KafkaNodePool — defines the broker+controller nodes for the KRaft cluster.
# Strimzi 1.0 dropped ZooKeeper; node pools are required.
# dual-role: each node acts as both KRaft controller and Kafka broker,
# which is the recommended topology for single-node local dev.
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka-cluster-dual-role
  namespace: {{ .Release.Namespace }}
  labels:
    strimzi.io/cluster: kafka-cluster
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.kafka.replicas }}
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
---
# Kafka CR — cluster-level config. Node pools supply replicas + storage.
# strimzi.io/kraft and strimzi.io/node-pools annotations enable KRaft mode.
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka-cluster
  namespace: {{ .Release.Namespace }}
  annotations:
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: enabled
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  kafka:
    version: {{ .Values.kafka.version }}
    metadataVersion: {{ .Values.kafka.metadataVersion | quote }}
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      log.retention.hours: 24
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics-config
          key: kafka-metrics-config.yml
  entityOperator:
    topicOperator: {}
    userOperator: {}
{{- end }}
